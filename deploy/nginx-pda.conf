# Nginx 리버스 프록시: 포트 80 → 3000
# 사용 시: 포트 번호 없이 http://pda.dongasteel.co.kr/ 로 접속 가능
#
# 설치 (Windows): https://nginx.org/en/download.html 에서 다운로드 후 압축 해제
# Linux: sudo apt install nginx  또는  sudo yum install nginx
#
# 적용 방법 (서버 경로가 C:\da_pda 인 경우):
#   Windows: nginx.exe 있는 폴더에서  nginx -c "C:\da_pda\deploy\nginx-pda.conf"
#   Linux:   sudo cp deploy/nginx-pda.conf /etc/nginx/conf.d/pda.conf  후  sudo nginx -s reload

server {
    listen 80;
    server_name pda.dongasteel.co.kr;
    # IP로만 접속하는 경우: server_name 61.107.76.23 pda.dongasteel.co.kr;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
